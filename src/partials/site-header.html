<link rel="stylesheet" href="/assets/glass-header.css" />
<svg class="liquid-glass-defs" aria-hidden="true" focusable="false" width="0" height="0"
  style="position: absolute; width: 0; height: 0; overflow: hidden">
  <filter id="liquid-glass-header" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="2" seed="14" stitchTiles="stitch"
      result="turbulence" />
    <feGaussianBlur in="turbulence" stdDeviation="1.4" result="smoothMap" />
    <feDisplacementMap in="SourceGraphic" in2="smoothMap" scale="80" xChannelSelector="R" yChannelSelector="G"
      result="displaced" />
    <feGaussianBlur in="displaced" stdDeviation="7" />
  </filter>
</svg>

<header class="site-header">
  <a class="brand" href="/">akashplackal.com</a>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="/writing/">POSTS</a>
    <a href="/topics/">TOPICS</a>
    <button type="button" class="contact-nav-button" popovertarget="contact-popover">CONTACT</button>
    <a href="/about/">ABOUT</a>
  </nav>
</header>

<div id="contact-popover" class="contact-dialog" popover aria-labelledby="contact-title">
  <form class="contact-form" action="https://mail.google.com/mail/" method="get" target="_blank"
    rel="noopener noreferrer">
    <div class="contact-header">
      <div class="contact-heading-group">
        <h2 id="contact-title">Get in touch</h2>
        <p class="contact-eyebrow">Email me, grab my resume, or send a quick message.</p>
      </div>
      <button type="button" class="contact-close" aria-label="Close" popovertarget="contact-popover"
        popovertargetaction="hide">&times;</button>
    </div>

    <div class="contact-quick">
      <div class="contact-direct">
        <span class="contact-direct-label">Email</span>
        <span class="contact-email" data-contact-email>akashplackal@gmail.com</span>
        <button type="button" class="contact-copy" data-contact-copy aria-live="polite">Copy</button>
      </div>
      <a class="contact-direct contact-resume" href="/assets/akash-plackal-resume.pdf" download
        aria-label="Download resume PDF">
        <span class="contact-direct-label">Resume</span>
        <span class="contact-email">akash-plackal-resume.pdf</span>
        <span class="contact-resume-cta" aria-hidden="true">Download </span>
      </a>
    </div>

    <input type="hidden" name="view" value="cm" />
    <input type="hidden" name="fs" value="1" />
    <input type="hidden" name="tf" value="1" />
    <input type="hidden" name="to" value="akashplackal@gmail.com" />

    <label class="contact-field">
      <span class="contact-label">Subject</span>
      <input type="text" name="su" required placeholder="What's this about?" />
    </label>

    <label class="contact-field">
      <span class="contact-label">Message</span>
      <textarea name="body" rows="5" required></textarea>
    </label>

    <div class="contact-actions">
      <button type="button" class="contact-btn contact-btn-secondary" popovertarget="contact-popover"
        popovertargetaction="hide">Cancel</button>
      <button type="submit" class="contact-btn contact-btn-primary">Send via Gmail</button>
    </div>
  </form>
</div>
