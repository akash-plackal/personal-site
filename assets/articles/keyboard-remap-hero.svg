<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Keyboard remap abstract</title>
  <desc id="desc">A clean abstract split keyboard with highlighted remapped keys and simple routing labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1713"/>
      <stop offset="100%" stop-color="#17241e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86a874"/>
      <stop offset="100%" stop-color="#c1a06a"/>
    </linearGradient>
    <style>
      .shell{fill:#121d18;stroke:#324038;stroke-width:2}.deck{fill:#101814;stroke:#2d4036;stroke-width:2}.key{fill:#1d2520;stroke:#324038;stroke-width:2}.hot{fill:#324036;stroke:#9fb378;stroke-width:2.5}.label{fill:#a8b09b;font:700 14px ui-monospace,Menlo,monospace}.hottext{fill:#e7ebdc;font:800 14px ui-monospace,Menlo,monospace}.route{fill:none;stroke:url(#accent);stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.node{fill:#9fb378}.gold{fill:#c1a06a}.pill{fill:#17241e;stroke:#465247;stroke-width:2}.pilltext{fill:#d5d9c8;font:800 14px ui-monospace,Menlo,monospace}
    </style>
  </defs>

  <rect width="960" height="420" fill="url(#bg)"/>
  <g opacity=".22" stroke="#2e4036" stroke-width="1">
    <path d="M0 70h960M0 140h960M0 210h960M0 280h960M0 350h960"/>
    <path d="M120 0v420M240 0v420M360 0v420M480 0v420M600 0v420M720 0v420M840 0v420"/>
  </g>

  <rect class="shell" x="112" y="92" width="736" height="250" rx="22"/>
  <path d="M480 122v190" stroke="#2d4036" stroke-width="2" opacity=".75"/>
  <path d="M190 118h580" stroke="#2d4036" stroke-width="2" opacity=".65"/>

  <g transform="rotate(-4 308 224)">
    <rect class="deck" x="148" y="142" width="310" height="156" rx="18"/>
    <g>
      <rect class="key" x="176" y="166" width="54" height="32" rx="7"/>
      <rect class="key" x="242" y="166" width="54" height="32" rx="7"/>
      <rect class="key" x="308" y="166" width="54" height="32" rx="7"/>
      <rect class="key" x="374" y="166" width="54" height="32" rx="7"/>

      <rect class="hot" x="176" y="216" width="84" height="34" rx="8"/>
      <rect class="key" x="276" y="216" width="54" height="34" rx="8"/>
      <rect class="key" x="342" y="216" width="54" height="34" rx="8"/>

      <rect class="hot" x="176" y="266" width="104" height="34" rx="8"/>
      <rect class="key" x="296" y="266" width="54" height="34" rx="8"/>
      <rect class="key" x="362" y="266" width="72" height="34" rx="8"/>
    </g>
    <text class="hottext" x="218" y="238" text-anchor="middle">CAPS</text>
    <text class="hottext" x="228" y="288" text-anchor="middle">SHIFT</text>
  </g>

  <g transform="rotate(4 652 224)">
    <rect class="deck" x="502" y="142" width="310" height="156" rx="18"/>
    <g>
      <rect class="key" x="532" y="166" width="54" height="32" rx="7"/>
      <rect class="key" x="598" y="166" width="54" height="32" rx="7"/>
      <rect class="key" x="664" y="166" width="54" height="32" rx="7"/>
      <rect class="key" x="730" y="166" width="54" height="32" rx="7"/>

      <rect class="key" x="532" y="216" width="54" height="34" rx="8"/>
      <rect class="key" x="598" y="216" width="54" height="34" rx="8"/>
      <rect class="key" x="664" y="216" width="54" height="34" rx="8"/>
      <rect class="hot" x="730" y="216" width="72" height="34" rx="8"/>

      <rect class="key" x="532" y="266" width="76" height="34" rx="8"/>
      <rect class="hot" x="624" y="266" width="54" height="34" rx="8"/>
      <rect class="key" x="694" y="266" width="90" height="34" rx="8"/>
    </g>
    <text class="hottext" x="766" y="238" text-anchor="middle">↵</text>
    <text class="hottext" x="651" y="288" text-anchor="middle">M</text>
  </g>

  <g opacity=".9">
    <rect class="pill" x="342" y="70" width="82" height="30" rx="15"/>
    <text class="pilltext" x="383" y="90" text-anchor="middle">Esc</text>
    <rect class="pill" x="438" y="70" width="82" height="30" rx="15"/>
    <text class="pilltext" x="479" y="90" text-anchor="middle">Ctrl</text>
    <rect class="pill" x="356" y="330" width="144" height="30" rx="15"/>
    <text class="pilltext" x="428" y="350" text-anchor="middle">Backspace</text>
    <rect class="pill" x="704" y="330" width="94" height="30" rx="15"/>
    <text class="pilltext" x="751" y="350" text-anchor="middle">Enter</text>
  </g>

  <g opacity=".82">
    <path class="route" d="M230 218V86h112"/>
    <path class="route" d="M250 218V86h188" opacity=".58"/>
    <path class="route" d="M238 292v53h118"/>
    <path class="route" d="M650 300v45h54"/>
    <path class="route" d="M678 284h58v-34" opacity=".72"/>
  </g>

  <g>
    <circle class="node" cx="342" cy="86" r="8"/>
    <circle class="node" cx="438" cy="86" r="8" opacity=".72"/>
    <circle class="node" cx="356" cy="345" r="8"/>
    <circle class="node" cx="704" cy="345" r="8"/>
    <circle class="gold" cx="736" cy="250" r="9"/>
  </g>
</svg>
