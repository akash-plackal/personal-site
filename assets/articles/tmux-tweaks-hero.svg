<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Clean tmux terminal workspace</title>
  <desc id="desc">A minimal tmux terminal window with split panes and a small popup shell in the site color palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141a15"/>
      <stop offset="100%" stop-color="#1d2520"/>
    </linearGradient>
    <style>
      .window{fill:#121914;stroke:#465247;stroke-width:2}.bar{fill:#1d2520}.pane{fill:#141a15;stroke:#465247;stroke-width:2}.active{stroke:#9fb378}.popup{fill:#1d2520;stroke:#9fb378;stroke-width:2}.dot-a{fill:#c48f68}.dot-b{fill:#9fb378}.dot-c{fill:#7f9974}.muted{fill:#a8b09b}.fg{fill:#d5d9c8}.bright{fill:#e7ebdc}.code{font:700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.small{font:700 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.label{font:800 14px system-ui,-apple-system,BlinkMacSystemFont,sans-serif;letter-spacing:.08em}
    </style>
  </defs>

  <rect width="960" height="420" fill="url(#bg)"/>

  <rect class="window" x="92" y="76" width="776" height="268" rx="18"/>
  <rect class="bar" x="92" y="76" width="776" height="42" rx="18"/>
  <path d="M92 118h776" stroke="#465247" stroke-width="2"/>
  <circle class="dot-a" cx="128" cy="97" r="6"/>
  <circle class="dot-b" cx="150" cy="97" r="6"/>
  <circle class="dot-c" cx="172" cy="97" r="6"/>
  <text class="label muted" x="480" y="102" text-anchor="middle">TMUX · WORK</text>

  <rect class="pane active" x="118" y="142" width="350" height="126" rx="10"/>
  <rect class="pane" x="492" y="142" width="350" height="126" rx="10"/>
  <rect class="pane" x="118" y="288" width="724" height="34" rx="9"/>

  <g class="code">
    <text class="muted" x="148" y="178">$ tmux new -s focus</text>
    <text class="fg" x="148" y="212">prefix: Ctrl-a</text>
    <text class="muted" x="148" y="246">split panes with | and -</text>

    <text class="muted" x="522" y="178">$ nvim notes.md</text>
    <text class="fg" x="522" y="212">truecolor enabled</text>
    <text class="muted" x="522" y="246">vim-style pane movement</text>

    <text class="fg" x="148" y="311">1:zsh</text>
    <text class="muted" x="238" y="311">2:nvim</text>
    <text class="muted" x="338" y="311">3:logs</text>
  </g>

  <g transform="translate(358 174)">
    <rect class="popup" x="0" y="0" width="244" height="92" rx="14"/>
    <text class="label bright" x="122" y="32" text-anchor="middle">POPUP SHELL</text>
    <path d="M28 48h188" stroke="#465247" stroke-width="2" stroke-linecap="round"/>
    <text class="small muted" x="28" y="72">$ scratch command</text>
  </g>
</svg>
