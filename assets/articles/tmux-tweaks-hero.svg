<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Tmux workflow abstract</title>
  <desc id="desc">Abstract tmux terminal panes, session tabs, and pane navigation markers in the site color palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1713"/>
      <stop offset="100%" stop-color="#17241e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86a874"/>
      <stop offset="100%" stop-color="#c1a06a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>

  <g opacity=".22" stroke="#2e4036" stroke-width="1">
    <path d="M0 70h960M0 140h960M0 210h960M0 280h960M0 350h960"/>
    <path d="M120 0v420M240 0v420M360 0v420M480 0v420M600 0v420M720 0v420M840 0v420"/>
  </g>

  <rect x="80" y="68" width="800" height="284" rx="14" fill="#121d18" stroke="#324038"/>
  <circle cx="116" cy="96" r="6" fill="#c48f68"/>
  <circle cx="138" cy="96" r="6" fill="#9fb378"/>
  <circle cx="160" cy="96" r="6" fill="#7f9974"/>
  <text x="480" y="102" text-anchor="middle" fill="#a8b09b" opacity=".85" font-family="ui-monospace, Menlo, monospace" font-size="15" font-weight="700">tmux · focus</text>

  <g fill="none" stroke="#2d4036" stroke-width="3" opacity=".92">
    <path d="M80 124h800"/>
    <path d="M480 124v178"/>
    <path d="M80 252h800"/>
    <path d="M80 302h800"/>
  </g>

  <g fill="#8fa58a" opacity=".84" font-family="ui-monospace, Menlo, monospace" font-size="18">
    <text x="118" y="166">$ tmux new -s focus</text>
    <text x="118" y="206">prefix C-a</text>
    <text x="526" y="166">split-window -h</text>
    <text x="526" y="206">select-pane -L</text>
    <text x="118" y="334">1:zsh</text>
    <text x="230" y="334">2:nvim</text>
    <text x="356" y="334">3:logs</text>
  </g>

  <g fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".78">
    <path d="M210 260v-34h165"/>
    <path d="M375 226h105"/>
    <path d="M480 226h142v-34"/>
    <path d="M622 192h116"/>
  </g>

  <g fill="#9fb378">
    <circle cx="210" cy="260" r="8"/>
    <circle cx="375" cy="226" r="8"/>
    <circle cx="622" cy="192" r="8"/>
    <circle cx="738" cy="192" r="8"/>
  </g>

  <g opacity=".9">
    <rect x="628" y="268" width="54" height="24" rx="6" fill="#324036" stroke="#9fb378"/>
    <rect x="694" y="268" width="54" height="24" rx="6" fill="#324036" stroke="#9fb378"/>
    <rect x="760" y="268" width="54" height="24" rx="6" fill="#324036" stroke="#9fb378"/>
    <text x="655" y="285" text-anchor="middle" fill="#e7ebdc" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700">h</text>
    <text x="721" y="285" text-anchor="middle" fill="#e7ebdc" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700">j</text>
    <text x="787" y="285" text-anchor="middle" fill="#e7ebdc" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700">l</text>
  </g>

  <circle cx="830" cy="108" r="10" fill="#c1a06a"/>
</svg>
