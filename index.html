<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="speculationrules">
    {
      "prerender": [
        {
          "source": "list",
          "urls": ["/about/"],
          "eagerness": "immediate"
        }
      ]
    }
  </script>
  <title>Akash Plackal</title>
  <meta name="description" content="Akash Plackal personal website. Built to be fast and reliable on slow networks." />
  <meta property="og:title" content="Akash Plackal" />
  <meta property="og:description" content="I build fast, reliable software with a focus on real-world performance and simple tooling." />
  <meta property="og:type" content="website" />
  <style>
    @font-face {
      font-family: "Iosevka Local";
      src:
        local("Iosevka"),
        local("Iosevka Term"),
        local("Iosevka Slab"),
        url("/assets/fonts/iosevka-slab-latin-400.woff2") format("woff2");
      font-style: normal;
      font-weight: 400;
      font-display: optional;
      unicode-range:
        U+0020-007E, U+00A0, U+00A9, U+00AE, U+00B0, U+00B7, U+00D7, U+00F7,
        U+0131, U+2013, U+2014, U+2018, U+2019, U+201C, U+201D, U+2022,
        U+2026, U+20AC, U+2122;
    }

    :root {
      --font-main: "Iosevka Local", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --bg: #141a15;
      --surface: #1d2520;
      --fg: #d5d9c8;
      --muted: #a8b09b;
      --line: #465247;
      --link: #9fb378;
      --ring: #8daa7f;
      --selection-bg: #324036;
      --selection-fg: #e7ebdc;
    }

    @view-transition {
      navigation: auto;
    }

    html {
      background: var(--bg);
    }

    ::view-transition {
      background: var(--bg);
    }

    ::view-transition-group(root),
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    ::view-transition-group(hero-avatar) {
      animation-duration: 320ms;
      animation-timing-function: ease;
    }

    ::view-transition-old(hero-avatar),
    ::view-transition-new(hero-avatar) {
      animation-duration: 320ms;
      mix-blend-mode: normal;
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-photo {
        view-transition-name: none;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      max-width: 52rem;
      margin-inline: auto;
      padding: 1.25rem;
      font: 16px/1.5 var(--font-main);
      color: var(--fg);
      background: var(--bg);
    }

    a {
      color: var(--link);
      text-decoration-color: var(--line);
      text-underline-offset: 0.16em;
      text-decoration-thickness: 0.08em;
    }

    a:hover,
    a:focus-visible {
      color: var(--fg);
    }

    a:focus-visible {
      outline: 2px solid var(--ring);
      outline-offset: 3px;
      border-radius: 0.25rem;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .brand,
    .site-nav a {
      text-decoration: none;
    }

    .brand {
      color: var(--fg);
      font-size: 1.5rem;
      font-weight: 600;
    }

    .site-nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    main {
      display: grid;
      gap: 1.5rem;
    }

    .hero {
      display: grid;
      gap: 1.25rem;
      align-items: center;
    }

    @media (min-width: 48rem) {
      .hero {
        grid-template-columns: minmax(0, 1.15fr) 15rem;
      }
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 38rem;
    }

    .hero-link {
      display: inline-block;
      justify-self: start;
    }

    .hero-photo {
      display: block;
      width: min(100%, 15rem);
      aspect-ratio: 1;
      object-fit: cover;
      object-position: 50% 40%;
      border-radius: 1rem;
      border: 1px solid var(--line);
      background: var(--surface);
      view-transition-name: hero-avatar;
    }

    .list {
      display: grid;
      gap: 0.55rem;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .list a {
      text-decoration-style: dotted;
    }

    ::selection {
      color: var(--selection-fg);
      background: var(--selection-bg);
    }

    @media (max-width: 40rem) {
      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/">aka.sh</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="/about/">About</a>
      <a href="#writing">Writing</a>
    </nav>
  </header>

  <main>
    <section class="hero" aria-labelledby="home-title">
      <div>
        <h1 id="home-title">Akash Plackal</h1>
        <p>I build fast, reliable software with a focus on real-world performance and simple tooling.</p>
      </div>

      <a class="hero-link" href="/about/" aria-label="Go to the about page">
        <img class="hero-photo" src="/assets/hero-avatar-640.avif" width="640" height="640"
          alt="Portrait of Akash Plackal." fetchpriority="high" decoding="async" />
      </a>
    </section>

    <section id="writing" aria-labelledby="writing-title">
      <h2 id="writing-title">Writing</h2>
      <ul class="list">
        <li><a href="/articles/request-waterfalls-i-actually-trust/">Request Waterfalls I Actually Trust</a></li>
        <li><a href="/articles/cold-cache-checklist-before-i-ship/">Cold-Cache Checklist Before I Ship</a></li>
        <li><a href="/articles/static-site-caching-without-guesswork/">Static Site Caching Without Guesswork</a></li>
      </ul>
    </section>
  </main>
</body>

</html>
